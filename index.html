<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishNet Lite</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .safe { color: #22c55e; }
        .warning { color: #facc15; }
        .danger { color: #ef4444; }
    </style>
</head>

<body>

<div class="container">
    <h1>🛡️ PhishNet Lite</h1>
    <p>Real-Time Phishing Detector</p>

    <input type="text" id="urlInput" placeholder="Enter URL here...">

    <br>
    <button onclick="checkPhishing()">Check</button>

    <div class="result" id="result"></div>
</div>

<script>
function checkPhishing() {
    let url = document.getElementById("urlInput").value.toLowerCase();
    let score = 0;

    if (url.includes("@")) score += 2;
    if (url.length > 75) score += 1;
    if (url.includes("login") || url.includes("verify") || url.includes("bank")) score += 2;
    if (url.startsWith("http://")) score += 1;
    if (/\d{1,3}(\.\d{1,3}){3}/.test(url)) score += 2;

    let resultText = "";
    let resultClass = "";

    if (score >= 4) {
        resultText = "❌ Phishing Website Detected";
        resultClass = "danger";
    } else if (score >= 2) {
        resultText = "⚠️ Suspicious Website";
        resultClass = "warning";
    } else {
        resultText = "✅ Safe Website";
        resultClass = "safe";
    }

    let resultDiv = document.getElementById("result");
    resultDiv.innerText = resultText;
    resultDiv.className = "result " + resultClass;
}
</script>
<script src="script.js"></script>
</body>
</html>
